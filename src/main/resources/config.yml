# =========================================================
#  ArenaPvP - configuration
#  Les arenes sont normalement creees/editees via les
#  commandes en jeu (/p ...). Ce fichier est ecrit et
#  relu automatiquement par le plugin.
# =========================================================

# Points necessaires pour gagner une partie
points-to-win: 5

# Temps de recharge de l'arc, en secondes
bow-cooldown-seconds: 3

# Delai (secondes) avant teleportation de retour apres la fin d'une partie
end-delay-seconds: 5

# Couleurs des equipes dans l'ordre : equipe 1, equipe 2, equipe 3, equipe 4
# Valeurs possibles : n'importe quelle ChatColor Bukkit valide (LIGHT_PURPLE, DARK_PURPLE,
# BLUE, DARK_BLUE, RED, GREEN, YELLOW, AQUA, GOLD, ...). Attention : Bukkit n'a PAS de
# ChatColor "PINK" ni "MAGENTA" (contrairement aux vitres teintees/laines) ; LIGHT_PURPLE
# est l'equivalent texte le plus proche du magenta/rose.
team-colors:
  - LIGHT_PURPLE
  - DARK_PURPLE
  - BLUE
  - DARK_BLUE

team-display-names:
  - "Magenta"
  - "Rose"
  - "Violet"
  - "Bleu fonce"

arenas: {}
