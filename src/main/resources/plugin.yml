name: ArenaPvP

version: '1.0.4'
main: com.arenapvp.plugin.ArenaPvPPlugin
api-version: '1.21'
author: ArenaPvP
description: Mini-jeu PvP par equipes en arene avec vide, lobby d'attente et kit fixe.

commands:
  p:
    description: Commande principale du plugin ArenaPvP
    usage: /p <create|delete|setspawn|delspawn|spawns|setlobby|setvoid|setpos1|setpos2|setteams|setteamsize|setminplayers|list|info|join|leave|stats|gui|leaderboard|forcestart|reload>
    permission: arenapvp.use
    permission-message: "§cTu n'as pas la permission d'utiliser cette commande."

permissions:
  arenapvp.admin:
    description: Permet de configurer les arenes et de forcer le demarrage des parties
    default: op
  arenapvp.play:
    description: Permet de rejoindre une arene
    default: true
  arenapvp.use:
    description: Permet d'utiliser les commandes de base (/p list, info, join, leave, stats)
    default: true
